<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hotspot Workflow Demo</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f4; }
    img { max-width: 350px; margin: 20px auto; display: block; border: 2px solid #ccc; }
    h2 { margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Interactive Workflow Demo</h1>
  <h2 id="title">Screen: Settings</h2>
  <img id="screen" src="1.png" usemap="#map1">

  <!-- Hotspot maps -->
  <map name="map1">
    <!-- Click on "Apps" -->
    <area shape="rect" coords="152,38,208,111" href="#" onclick="goTo(2)" alt="Apps">
    <!-- Back button -->
    <area shape="rect" coords="78,672,116,707" href="#" onclick="goBack()" alt="Back">
  </map>

  <map name="map2">
    <!-- Click on "noon Food OMS" -->
    <area shape="rect" coords="32,337,265,376" href="#" onclick="goTo(3)" alt="noon Food OMS">
    <!-- Back button -->
    <area shape="rect" coords="82,627,116,657" href="#" onclick="goBack()" alt="Back">
  </map>

  <map name="map3">
    <!-- Click on "Storage and cache" -->
    <area shape="rect" coords="34,108,264,149" href="#" onclick="goTo(4)" alt="Storage and cache">
    <!-- Back button -->
    <area shape="rect" coords="82,627,116,657" href="#" onclick="goBack()" alt="Back">
  </map>

  <map name="map4">
    <!-- Click on "Clear cache" -->
    <area shape="rect" coords="26,420,302,459" href="#" onclick="goTo(5)" alt="Clear cache">
    <!-- Back button -->
    <area shape="rect" coords="75,650,116,687" href="#" onclick="goBack()" alt="Back">
  </map>

  <map name="map5">
    <!-- Final screen, only back -->
    <area shape="rect" coords="82,627,116,657" href="#" onclick="goBack()" alt="Back">
  </map>

  <script>
    const screens = [
      {src:"1.png", title:"Screen: Settings", map:"map1"},
      {src:"2.png", title:"Screen: Apps", map:"map2"},
      {src:"3.png", title:"Screen: noon Food OMS", map:"map3"},
      {src:"4.png", title:"Screen: Storage & Cache", map:"map4"},
      {src:"5.png", title:"Screen: Cache Cleared", map:"map5"}
    ];
    let current = 0;

    function goTo(index) {
      current = index - 1; // adjust for array index
      updateScreen();
    }

    function goBack() {
      if (current > 0) {
        current--;
        updateScreen();
      }
    }

    function updateScreen() {
      document.getElementById("screen").src = screens[current].src;
      document.getElementById("screen").useMap = "#" + screens[current].map;
      document.getElementById("title").innerText = screens[current].title;
    }
  </script>
</body>
</html>
