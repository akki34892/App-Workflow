</head>
<body>

 <map name="map6">

    <area shape="rect" coords="75,650,116,687" href="#" onclick="goTo(1)" alt="Back">
  </map>

  <map name="map7">
    <!-- Click on "Restaurant" -->
    <area shape="rect" coords="33,575,325,628" href="#" onclick="goTo(8)" alt="Select Rest">

  </map>
  
 <map name="map8">

    <!-- Back button -->
    <area shape="rect" coords="75,650,116,687" href="#" onclick="goBack()" alt="Back">
  </map>

    <area shape="rect" coords="29,260,176,312" href="#" onclick="goTo(11)" alt="Operational Hours">
    <area shape="rect" coords="27,328,176,388" href="#" onclick="goTo(12)" alt="Menu">

   <map name="map11">

    <area shape="rect" coords="75,650,116,687" href="#" onclick="goBackTo(10)" alt="Back">
  </map>

   <map name="map13">
    <!-- Back button -->
    <area shape="rect" coords="75,650,116,687" href="#" onclick="goBackTo(10)" alt="Back">
  </map>

   <map name="map14">
    <!-- Back button -->
    <area shape="rect" coords="75,650,116,687" href="#" onclick="goBackTo(10)" alt="Back">
  </map>

    <map name="map15">
    <!-- Back button -->
    <area shape="rect" coords="75,650,116,687" href="#" onclick="goBackTo(10)" alt="Back">
  </map>

     <map name="map16">
    <!-- Back button -->
    <area shape="rect" coords="75,650,116,687" href="#" onclick="goBackTo(9)" alt="Back">
  </map>
  <script>
   const screens = [
  {src:"1.png", title:"Screen: Home", map:"map1"},
  {src:"2.png", title:"Screen: Apps", map:"map2"},
  {src:"3.png", title:"Screen: Noon Food OMS", map:"map3"},
  {src:"4.png", title:"Screen: Storage & Cache", map:"map4"},
  {src:"5.png", title:"Screen: Cache Cleared", map:"map5"},
  {src:"6.png", title:"Screen: Login Screen", map:"map6"},
  {src:"7.png", title:"Screen: Select rest", map:"map7"},
  {src:"8.png", title:"Screen: Select outlet", map:"map8"},
  {src:"9.png", title:"Screen: Logged In", map:"map9"},
  {src:"10.png", title:"Screen: Options", map:"map10"},
  {src:"11.png", title:"Screen: Operational Hours", map:"map11"},
  {src:"12.png", title:"Screen: Menu category", map:"map12"},
  {src:"13.png", title:"Screen: Menu", map:"map13"},
  {src:"14.png", title:"Screen: Items", map:"map14"},
  {src:"15.png", title:"Screen: Help centre", map:"map15"},
  {src:"16.png", title:"Screen: App Setting", map:"map16"},
];

    let current = 0;

    function goTo(index) {
      current = index - 1; // adjust for array index
      updateScreen();
    }

    function goBackTo(index) {
      current = index - 1; // adjust for array index
      updateScreen();
    }

    function goBack() {
      if (current > 0) {
        current--;
        updateScreen();
      }
    }

    function updateScreen() {
      document.getElementById("screen").src = screens[current].src;
      document.getElementById("screen").useMap = "#" + screens[current].map;
      document.getElementById("title").innerText = screens[current].title;
    }
  </script>
</body>
</html>
